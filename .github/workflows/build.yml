name: Android CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        if: github.ref_type != 'tag'
        run: ./gradlew testDebugUnitTest

      - name: Build with Gradle
        if: github.ref_type == 'tag'
        run: ./gradlew bundle

      - name: Android Sign 2
        # You may pin to the exact commit or the version.
        # uses: MatiasG19/android-sign@7d708e05499b8f04228c25d0ab1ce749c92de194
        uses: MatiasG19/android-sign@2.2.1
        if: github.ref_type == 'tag'
        with:
          # The directory to find your release to sign
          releaseDirectory: app/build/outputs/bundle/release
          # The key used to sign your release in base64 encoded format
          signingKeyBase64: ${{ secrets.SIGNING_KEY }}
          # The key alias
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          # The password to the keystore
          keyStorePassword: ${{ secrets.KEYSTORE_PASSWORD }}
          # The password for the key
          keyPassword: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
          # The output directory for sign, default to build/signed
          output: build/release/signed

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: build/release/signed/*.aab
