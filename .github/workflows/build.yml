name: Android CI

on: push

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run Unit Tests
        run: ./gradlew testDebugUnitTest

      - name: Build with Gradle
        if: github.ref_type == 'tag'
        run: ./gradlew assemble && ./gradlew bundle

      - name: Sign Android Release APK
        # if: github.ref_type == 'tag'
        uses: caffeine-soft/android-signer-action@v0
        with:
          release_dir: 'app/build/outputs'
          signing_key: ${{ secrets.SIGNING_KEY }}
          alias: ${{ secrets.KEYSTORE_ALIAS }}
          key_store_password: ${{ secrets.KEYSTORE_PASSWORD }}
          key_password: ${{ secrets.KEYSTORE_KEY_PASSWORD }}
        env:
          BUILD_TOOLS_VERSION: "36.0.0"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: github.ref_type == 'tag'
        with:
          files: build/release/signed/*.apk
